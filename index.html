<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat vs Dog AI Classifier</title>
    <meta name="description" content="AI powered Cat vs Dog image classifier using CNN and MobileNetV2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(90deg, #ff6eb4, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .sub { color: #888; font-size: 13px; margin-bottom: 15px; }
        .box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            cursor: pointer; font-size: 14px; font-weight: bold;
            background: rgba(255,255,255,0.1); color: #fff;
        }
        .tab.active { background: linear-gradient(135deg, #a78bfa, #60a5fa); }
        .section { display: none; }
        .section.active { display: block; }
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px; padding: 30px;
            text-align: center; cursor: pointer;
        }
        .upload-area:hover { border-color: #a78bfa; }
        #preview, #camPreview {
            width: 100%; border-radius: 12px; margin: 10px 0;
            display: none; border: 2px solid rgba(255,255,255,0.1);
        }
        video {
            width: 100%; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
        }
        canvas { display: none; }
        .btn {
            width: 100%; padding: 12px; margin-top: 8px; border: none;
            border-radius: 10px; font-size: 15px; font-weight: bold;
            cursor: pointer; color: #fff;
        }
        .btn-blue { background: linear-gradient(135deg, #a78bfa, #60a5fa); }
        .btn-green { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-gray { background: rgba(255,255,255,0.1); }
        .btn-flip {
            background: rgba(255,255,255,0.15); padding: 10px;
            border-radius: 50%; width: 45px; height: 45px;
            font-size: 20px; border: none; cursor: pointer; color: #fff;
        }
        .cam-controls {
            display: flex; gap: 10px; justify-content: center;
            align-items: center; margin: 10px 0;
        }
        .result {
            margin-top: 12px; padding: 15px; border-radius: 12px;
            text-align: center; display: none;
        }
        .result.cat { background: rgba(255,110,180,0.15); border: 2px solid #ff6eb4; }
        .result.dog { background: rgba(96,165,250,0.15); border: 2px solid #60a5fa; }
        .result.human { background: rgba(250,204,21,0.15); border: 2px solid #facc15; }
        .result.none { background: rgba(239,68,68,0.15); border: 2px solid #ef4444; }
        .emoji { font-size: 40px; }
        .label { font-size: 22px; font-weight: bold; margin: 5px 0; }
        .msg { color: #aaa; font-size: 13px; }
        .loading { text-align: center; padding: 15px; color: #a78bfa; display: none; }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 3px solid rgba(167,139,250,0.3); border-radius: 50%;
            border-top-color: #a78bfa; animation: spin 1s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stats { display: flex; gap: 8px; margin-top: 12px; }
        .stat {
            flex: 1; background: rgba(255,255,255,0.05);
            border-radius: 10px; padding: 10px; text-align: center;
        }
        .stat-num { font-size: 20px; font-weight: bold; color: #a78bfa; }
        .stat-lbl { font-size: 10px; color: #888; }
        .footer { margin-top: 20px; color: #555; font-size: 11px; }
        .footer a { color: #a78bfa; text-decoration: none; }
        .tech {
            margin-top: 10px; display: flex; gap: 5px;
            flex-wrap: wrap; justify-content: center;
        }
        .tech span {
            background: rgba(167,139,250,0.1);
            border: 1px solid rgba(167,139,250,0.3);
            padding: 3px 10px; border-radius: 15px;
            font-size: 10px; color: #a78bfa;
        }
    </style>
</head>
<body>
    <h1>&#x1F431; Cat vs Dog AI &#x1F436;</h1>
    <p class="sub">Upload a photo or use camera to classify!</p>

    <div class="box">
        <div class="tabs">
            <button class="tab active" id="tabUpload">&#x1F4C1; Upload</button>
            <button class="tab" id="tabCamera">&#x1F4F7; Camera</button>
        </div>

        <div id="uploadSection" class="section active">
            <div class="upload-area" id="uploadArea">
                <div style="font-size:35px">&#x1F4C1;</div>
                <p style="color:#a78bfa;font-weight:bold;margin-top:5px">Click to upload</p>
                <p style="color:#666;font-size:12px">JPG, PNG supported</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
            <img id="preview" alt="preview">
            <button class="btn btn-blue" id="classifyUploadBtn" style="display:none">&#x1F50D; Classify</button>
        </div>

        <div id="cameraSection" class="section">
            <video id="video" autoplay playsinline></video>
            <img id="camPreview" alt="captured">
            <canvas id="canvas"></canvas>
            <div class="cam-controls">
                <button class="btn btn-green" style="flex:1" id="captureBtn">&#x1F4F8; Capture</button>
                <button class="btn-flip" id="flipBtn">&#x1F504;</button>
            </div>
            <button class="btn btn-blue" id="classifyCamBtn" style="display:none">&#x1F50D; Classify</button>
            <button class="btn btn-gray" id="retakeBtn" style="display:none">Retake</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div> AI is analyzing...
        </div>

        <div class="result" id="resultBox">
            <div class="emoji" id="emoji"></div>
            <div class="label" id="rlabel"></div>
            <div class="msg" id="rmsg"></div>
        </div>

        <div class="stats">
            <div class="stat"><div class="stat-num" id="tc">0</div><div class="stat-lbl">Scanned</div></div>
            <div class="stat"><div class="stat-num" id="cc">0</div><div class="stat-lbl">Cats</div></div>
            <div class="stat"><div class="stat-num" id="dc">0</div><div class="stat-lbl">Dogs</div></div>
        </div>
    </div>

    <div class="tech">
        <span>Python</span>
        <span>TensorFlow</span>
        <span>CNN</span>
        <span>MobileNetV2</span>
        <span>OpenCV</span>
        <span>Gradio</span>
    </div>

    <div class="footer">
        Built by Muhammad Qasim |
        <a href="https://huggingface.co/spaces/its-qasim/cat-dog-classifier" target="_blank">Hugging Face</a> |
        <a href="https://github.com/its-qasim/cat-dog-ai" target="_blank">GitHub</a>
    </div>

    <script>
        var uploadedImage = null;
        var capturedImage = null;
        var stream = null;
        var facingMode = "user";
        var total = 0;
        var cats = 0;
        var dogs = 0;
        var HF_URL = "https://its-qasim-cat-dog-classifier.hf.space";

        // Tab switching
        document.getElementById("tabUpload").addEventListener("click", function() {
            document.getElementById("tabUpload").classList.add("active");
            document.getElementById("tabCamera").classList.remove("active");
            document.getElementById("uploadSection").classList.add("active");
            document.getElementById("cameraSection").classList.remove("active");
            document.getElementById("resultBox").style.display = "none";
            stopCamera();
        });

        document.getElementById("tabCamera").addEventListener("click", function() {
            document.getElementById("tabCamera").classList.add("active");
            document.getElementById("tabUpload").classList.remove("active");
            document.getElementById("cameraSection").classList.add("active");
            document.getElementById("uploadSection").classList.remove("active");
            document.getElementById("resultBox").style.display = "none";
            startCamera();
        });

        // Upload
        document.getElementById("uploadArea").addEventListener("click", function() {
            document.getElementById("fileInput").click();
        });

        document.getElementById("fileInput").addEventListener("change", function(e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                uploadedImage = ev.target.result;
                document.getElementById("preview").src = uploadedImage;
                document.getElementById("preview").style.display = "block";
                document.getElementById("classifyUploadBtn").style.display = "block";
                document.getElementById("resultBox").style.display = "none";
            };
            reader.readAsDataURL(file);
        });

        document.getElementById("classifyUploadBtn").addEventListener("click", function() {
            classifyImage(uploadedImage);
        });

        // Camera
        function startCamera() {
            stopCamera();
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: facingMode },
                audio: false
            }).then(function(s) {
                stream = s;
                var v = document.getElementById("video");
                v.srcObject = stream;
                v.style.display = "block";
                document.getElementById("camPreview").style.display = "none";
                document.getElementById("captureBtn").style.display = "block";
                document.getElementById("classifyCamBtn").style.display = "none";
                document.getElementById("retakeBtn").style.display = "none";
            }).catch(function(err) {
                alert("Camera not available! Please allow camera access.");
            });
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(function(t) { t.stop(); });
                stream = null;
            }
        }

        document.getElementById("flipBtn").addEventListener("click", function() {
            if (facingMode === "user") {
                facingMode = "environment";
            } else {
                facingMode = "user";
            }
            startCamera();
        });

        document.getElementById("captureBtn").addEventListener("click", function() {
            var v = document.getElementById("video");
            var c = document.getElementById("canvas");
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            c.getContext("2d").drawImage(v, 0, 0);
            capturedImage = c.toDataURL("image/jpeg", 0.8);
            document.getElementById("camPreview").src = capturedImage;
            document.getElementById("camPreview").style.display = "block";
            v.style.display = "none";
            document.getElementById("captureBtn").style.display = "none";
            document.getElementById("classifyCamBtn").style.display = "block";
            document.getElementById("retakeBtn").style.display = "block";
            stopCamera();
        });

        document.getElementById("classifyCamBtn").addEventListener("click", function() {
            classifyImage(capturedImage);
        });

        document.getElementById("retakeBtn").addEventListener("click", function() {
            document.getElementById("camPreview").style.display = "none";
            document.getElementById("resultBox").style.display = "none";
            startCamera();
        });

        // Classify
        function classifyImage(imgData) {
            if (!imgData) return;
            document.getElementById("loading").style.display = "block";
            document.getElementById("resultBox").style.display = "none";

            fetch(HF_URL + "/api/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ data: [imgData] })
            })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                document.getElementById("loading").style.display = "none";
                showResult(d.data[0]);
            })
            .catch(function(err) {
                fetch(HF_URL + "/run/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: [imgData] })
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    document.getElementById("loading").style.display = "none";
                    showResult(d.data[0]);
                })
                .catch(function(err2) {
                    document.getElementById("loading").style.display = "none";
                    showResult("Could not connect. Open Hugging Face directly!");
                });
            });
        }

        // Show result
        function showResult(text) {
            var box = document.getElementById("resultBox");
            var em = document.getElementById("emoji");
            var lb = document.getElementById("rlabel");
            var mg = document.getElementById("rmsg");

            box.className = "result";
            total++;
            document.getElementById("tc").textContent = total;

            if (text.indexOf("CAT") !== -1) {
                box.classList.add("cat");
                em.textContent = "\u{1F431}";
                lb.textContent = "CAT DETECTED!";
                lb.style.color = "#ff6eb4";
                var match = text.match(/[\d.]+%/);
                mg.textContent = match ? "Confidence: " + match[0] : "";
                cats++;
                document.getElementById("cc").textContent = cats;
            } else if (text.indexOf("DOG") !== -1) {
                box.classList.add("dog");
                em.textContent = "\u{1F436}";
                lb.textContent = "DOG DETECTED!";
                lb.style.color = "#60a5fa";
                var match2 = text.match(/[\d.]+%/);
                mg.textContent = match2 ? "Confidence: " + match2[0] : "";
                dogs++;
                document.getElementById("dc").textContent = dogs;
            } else if (text.indexOf("HUMAN") !== -1) {
                box.classList.add("human");
                em.textContent = "\u{1F464}";
                lb.textContent = "HUMAN DETECTED!";
                lb.style.color = "#facc15";
                mg.textContent = "Not a cat or dog!";
            } else {
                box.classList.add("none");
                em.textContent = "\u2753";
                lb.textContent = "NOT DETECTED";
                lb.style.color = "#ef4444";
                mg.textContent = text;
            }

            box.style.display = "block";
        }
    </script>
</body>
</html>
