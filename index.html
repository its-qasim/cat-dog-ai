<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat vs Dog AI Classifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ff6eb4, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
        .app-frame {
            width: 100%;
            max-width: 900px;
            height: 700px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .app-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .features {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 20px;
            text-align: center;
            width: 150px;
        }
        .feature-icon { font-size: 28px; margin-bottom: 5px; }
        .feature-text { font-size: 12px; color: #aaa; }
        .footer {
            margin-top: 25px;
            color: #555;
            font-size: 12px;
        }
        .footer a { color: #a78bfa; text-decoration: none; }
        .tech {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tech span {
            background: rgba(167,139,250,0.1);
            border: 1px solid rgba(167,139,250,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <h1>🐱 Cat vs Dog AI 🐶</h1>
    <p class="subtitle">Upload a photo and AI will tell you if it is a Cat, Dog, or Human!</p>

    <div class="app-frame">
        <iframe src="https://its-qasim-cat-dog-classifier.hf.space"></iframe>
    </div>

    <div class="features">
        <div class="feature">
            <div class="feature-icon">🐱</div>
            <div class="feature-text">Cat Detection</div>
        </div>
        <div class="feature">
            <div class="feature-icon">🐶</div>
            <div class="feature-text">Dog Detection</div>
        </div>
        <div class="feature">
            <div class="feature-icon">👤</div>
            <div class="feature-text">Human Detection</div>
        </div>
        <div class="feature">
            <div class="feature-icon">🧠</div>
            <div class="feature-text">CNN + MobileNetV2</div>
        </div>
        <div class="feature">
            <div class="feature-icon">📊</div>
            <div class="feature-text">87.9% Accuracy</div>
        </div>
    </div>

    <div class="tech">
        <span>Python</span>
        <span>TensorFlow</span>
        <span>Keras</span>
        <span>OpenCV</span>
        <span>MobileNetV2</span>
        <span>CNN</span>
        <span>Gradio</span>
        <span>Hugging Face</span>
    </div>

    <div class="footer">
        Built by Muhammad Qasim |
        <a href="https://github.com/its-qasim/cat-dog-ai" target="_blank">GitHub</a> |
        <a href="https://huggingface.co/spaces/its-qasim/cat-dog-classifier" target="_blank">Hugging Face</a>
    </div>
</body>
</html>
