<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat vs Dog AI Classifier</title>
    <meta name="description" content="AI powered Cat vs Dog image classifier using CNN and MobileNetV2">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0f0f1a,#1a1a2e);min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;padding:20px 10px}
        h1{font-size:32px;background:linear-gradient(90deg,#ff6eb4,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
        .sub{color:#888;font-size:13px;margin-bottom:15px}
        .box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;width:100%;max-width:500px}
        .tabs{display:flex;gap:8px;margin-bottom:15px}
        .tab{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;background:rgba(255,255,255,0.1);color:#fff}
        .tab.active{background:linear-gradient(135deg,#a78bfa,#60a5fa)}
        .section{display:none}
        .section.active{display:block}
        .upload-area{border:2px dashed rgba(255,255,255,0.2);border-radius:12px;padding:30px;text-align:center;cursor:pointer}
        .upload-area:hover{border-color:#a78bfa}
        #preview,#camPreview{width:100%;border-radius:12px;margin:10px 0;display:none;border:2px solid rgba(255,255,255,0.1)}
        video{width:100%;border-radius:12px;border:2px solid rgba(255,255,255,0.1)}
        canvas{display:none}
        .btn{width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;color:#fff}
        .btn-blue{background:linear-gradient(135deg,#a78bfa,#60a5fa)}
        .btn-green{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-gray{background:rgba(255,255,255,0.1)}
        .btn-flip{background:rgba(255,255,255,0.15);padding:10px;border-radius:50%;width:45px;height:45px;font-size:20px;border:none;cursor:pointer;color:#fff}
        .cam-controls{display:flex;gap:10px;justify-content:center;align-items:center;margin:10px 0}
        .result{margin-top:12px;padding:15px;border-radius:12px;text-align:center;display:none}
        .result.cat{background:rgba(255,110,180,0.15);border:2px solid #ff6eb4}
        .result.dog{background:rgba(96,165,250,0.15);border:2px solid #60a5fa}
        .result.human{background:rgba(250,204,21,0.15);border:2px solid #facc15}
        .result.none{background:rgba(239,68,68,0.15);border:2px solid #ef4444}
        .emoji{font-size:40px}
        .label{font-size:22px;font-weight:bold;margin:5px 0}
        .msg{color:#aaa;font-size:13px}
        .loading{text-align:center;padding:15px;color:#a78bfa;display:none}
        .spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(167,139,250,0.3);border-radius:50%;border-top-color:#a78bfa;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
        .stats{display:flex;gap:8px;margin-top:12px}
        .stat{flex:1;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center}
        .stat-num{font-size:20px;font-weight:bold;color:#a78bfa}
        .stat-lbl{font-size:10px;color:#888}
        .footer{margin-top:20px;color:#555;font-size:11px}
        .footer a{color:#a78bfa;text-decoration:none}
        .tech{margin-top:10px;display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
        .tech span{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);padding:3px 10px;border-radius:15px;font-size:10px;color:#a78bfa}
    </style>
</head>
<body>
    <h1>🐱 Cat vs Dog AI 🐶</h1>
    <p class="sub">Upload a photo or use camera to classify!</p>
    <div class="box">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('upload')">📁 Upload</button>
            <button class="tab" onclick="switchTab('camera')">📷 Camera</button>
        </div>
        <div id="uploadSection" class="section active">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div style="font-size:35px">📁</div>
                <p style="color:#a78bfa;font-weight:bold;margin-top:5px">Click to upload</p>
                <p style="color:#666;font-size:12px">JPG, PNG supported</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload(event)">
            <img id="preview">
            <button class="btn btn-blue" id="classifyUploadBtn" style="display:none" onclick="classifyImage(uploadedImage)">🔍 Classify</button>
        </div>
        <div id="cameraSection" class="section">
            <video id="video" autoplay playsinline></video>
            <img id="camPreview">
            <canvas id="canvas"></canvas>
            <div class="cam-controls">
                <button class="btn btn-green" style="flex:1" id="captureBtn" onclick="capture()">📸 Capture</button>
                <button class="btn-flip" onclick="flipCamera()">🔄</button>
            </div>
            <button class="btn btn-blue" id="classifyCamBtn" style="display:none" onclick="classifyImage(capturedImage)">🔍 Classify</button>
            <button class="btn btn-gray" id="retakeBtn" style="display:none" onclick="retake()">Retake</button>
        </div>
        <div class="loading" id="loading"><div class="spinner"></div> AI is analyzing...</div>
        <div class="result" id="resultBox">
            <div class="emoji" id="emoji"></div>
            <div class="label" id="rlabel"></div>
            <div class="msg" id="rmsg"></div>
        </div>
        <div class="stats">
            <div class="stat"><div class="stat-num" id="tc">0</div><div class="stat-lbl">Scanned</div></div>
            <div class="stat"><div class="stat-num" id="cc">0</div><div class="stat-lbl">Cats</div></div>
            <div class="stat"><div class="stat-num" id="dc">0</div><div class="stat-lbl">Dogs</div></div>
        </div>
    </div>
    <div class="tech">
        <span>Python</span><span>TensorFlow</span><span>CNN</span><span>MobileNetV2</span><span>OpenCV</span><span>Gradio</span>
    </div>
    <div class="footer">Built by Muhammad Qasim | <a href="https://huggingface.co/spaces/its-qasim/cat-dog-classifier" target="_blank">Hugging Face</a> | <a href="https://github.com/its-qasim/cat-dog-ai" target="_blank">GitHub</a></div>

    <script>
        let uploadedImage=null,capturedImage=null,stream=null,facingMode="user",total=0,cats=0,dogs=0;
        const HF="https://its-qasim-cat-dog-classifier.hf.space";

        function switchTab(t){
            document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',t==(i==0?'upload':'camera')));
            document.getElementById('uploadSection').classList.toggle('active',t=='upload');
            document.getElementById('cameraSection').classList.toggle('active',t=='camera');
            document.getElementById('resultBox').style.display='none';
            if(t=='camera')startCamera();
            else stopCamera();
        }

        function handleUpload(e){
            const file=e.target.files[0];
            if(!file)return;
            const r=new FileReader();
            r.onload=ev=>{
                uploadedImage=ev.target.result;
                document.getElementById('preview').src=uploadedImage;
                document.getElementById('preview').style.display='block';
                document.getElementById('classifyUploadBtn').style.display='block';
                document.getElementById('resultBox').style.display='none';
            };
            r.readAsDataURL(file);
        }

        async function startCamera(){
            stopCamera();
            try{
                stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode},audio:false});
                const v=document.getElementById('video');
                v.srcObject=stream;
                v.style.display='block';
                document.getElementById('camPreview').style.display='none';
                document.getElementById('captureBtn').style.display='block';
                document.getElementById('classifyCamBtn').style.display='none';
                document.getElementById('retakeBtn').style.display='none';
            }catch(e){alert('Camera not available! Please allow camera access.')}
        }

        function stopCamera(){
            if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
        }

        function flipCamera(){
            facingMode=facingMode=="user"?"environment":"user";
            startCamera();
        }

        function capture(){
            const v=document.getElementById('video'),c=document.getElementById('canvas');
            c.width=v.videoWidth;c.height=v.videoHeight;
            c.getContext('2d').drawImage(v,0,0);
            capturedImage=c.toDataURL('image/jpeg',0.8);
